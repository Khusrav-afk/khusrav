<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d1a;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(99,57,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,57,130,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 390px;
    animation: rise 0.8s cubic-bezier(0.22,1,0.36,1) both;
    position: relative;
    z-index: 1;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .avatar-section {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    position: relative;
  }

  .avatar-ring {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    margin: 0 auto 1.2rem;
    padding: 3px;
    background: linear-gradient(135deg, #6339ff, #ff3982, #ffb13a);
    animation: spin-slow 4s linear infinite;
  }

  @keyframes spin-slow {
    from { background: linear-gradient(135deg, #6339ff, #ff3982, #ffb13a); }
    to { background: linear-gradient(495deg, #6339ff, #ff3982, #ffb13a); }
  }

  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #0d0d1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #6339ff22, #ff398222);
    color: #fff;
  }

  .name {
    font-family: 'Outfit', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    margin-bottom: 0.4rem;
    background: linear-gradient(90deg, #fff 60%, #aaa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .role-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(99,57,255,0.15);
    border: 1px solid rgba(99,57,255,0.3);
    color: #a98bff;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 0 1rem;
  }

  .sec-label {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 8px 4px 2px;
  }

  .btn-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    text-decoration: none;
    color: #fff;
    font-size: 14px;
    transition: all 0.25s;
    backdrop-filter: blur(10px);
  }

  .btn-card:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.15);
    transform: translateX(6px);
  }

  .btn-card:active { transform: scale(0.98); }

  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .bi-phone { background: linear-gradient(135deg, #6339ff33, #6339ff11); border: 1px solid #6339ff44; }
  .bi-wa    { background: linear-gradient(135deg, #25D36633, #25D36611); border: 1px solid #25D36644; }
  .bi-tg    { background: linear-gradient(135deg, #2AABEE33, #2AABEE11); border: 1px solid #2AABEE44; }
  .bi-mail  { background: linear-gradient(135deg, #ff398233, #ff398211); border: 1px solid #ff398244; }
  .bi-ig    { background: linear-gradient(135deg, #f0943333, #bc188833); border: 1px solid #dc274344; }

  .btn-info { flex: 1; }
  .btn-label { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .btn-val { font-size: 14px; color: #fff; }

  .btn-arrow {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-card:hover .btn-arrow {
    background: linear-gradient(135deg, #6339ff, #ff3982);
    border-color: transparent;
    color: #fff;
  }

  .footer {

    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 500;

</style>
