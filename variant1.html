<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1f1f1f;
    --accent: #c8f135;
    --text: #f0f0f0;
    --muted: #666;
    --card-bg: #131313;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    width: 100%;
    max-width: 380px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.2rem;
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
    position: relative;
    overflow: hidden;
  }

  .avatar::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0.3;
    animation: pulse 2.5s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.08); opacity: 0.08; }
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.4rem;
  }

  .role {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 8px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 400;
    transition: all 0.2s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .link-btn:hover {
    border-color: #2a2a2a;
    background: #161616;
    transform: translateX(4px);
  }

  .link-btn:hover::before { opacity: 1; }

  .link-btn:active { transform: scale(0.98) translateX(4px); }

  .icon-wrap {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }

  .icon-wrap.phone { background: #1a2a1a; }
  .icon-wrap.whatsapp { background: #1a2a1a; }
  .icon-wrap.instagram { background: #2a1a20; }
  .icon-wrap.telegram { background: #1a1f2a; }
  .icon-wrap.email { background: #1a1a2a; }

  .link-info { flex: 1; }
  .link-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .link-value { font-size: 14px; color: var(--text); }

  .arrow {
    font-size: 16px;
    color: var(--muted);
    transition: color 0.2s, transform 0.2s;
  }

  .link-btn:hover .arrow {
    color: var(--accent);
    transform: translateX(2px);
  }

  .section-title {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 1.4rem 0 0.8rem;
    padding-left: 2px;
  }

  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 11px;
    color: #333;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .accent { color: var(--accent); }

  svg { display: block; }
</style>
