<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1c1c1c;
    --card: #242424;
    --surface: #2a2a2a;
    --dark: #1c1c1c;
    --mid: #888;
    --muted: #666;
    --accent: #c17b3f;
    --accent2: #7b5ea7;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    width: 100%;
    max-width: 390px;
    animation: up 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes up {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    background: #272727;
    border-radius: 24px;
    padding: 2rem;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(193,123,63,0.25);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 8px 32px rgba(0,0,0,0.4);
  }

  .header-deco  { position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.05); }
  .header-deco2 { position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08); }
  .header-deco3 { position: absolute; bottom: -30px; left: 40px; width: 80px; height: 80px; border-radius: 50%; border: 1px solid rgba(193,123,63,0.2); }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.8rem;
    position: relative;
    z-index: 1;
  }

  .nfc-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  .nfc-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 2s ease infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(193,123,63,0.12);
    border: 1px solid rgba(193,123,63,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: var(--accent);
    font-family: 'Playfair Display', serif;
  }

  .header-name { position: relative; z-index: 1; }
  .name-label { display: none; }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 3rem; font-weight: 700; color: #fff;
    line-height: 1; margin-bottom: 0.5rem; letter-spacing: -1px;
  }

  .role-line { display: flex; align-items: center; gap: 10px; }
  .role-sep { width: 24px; height: 1px; background: rgba(193,123,63,0.4); }
  .role { font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 300; letter-spacing: 1px; }

  .links { display: flex; flex-direction: column; gap: 8px; }

  .link-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 14px 16px;
    display: flex; align-items: center; gap: 13px;
    text-decoration: none; color: var(--text);
    transition: all 0.22s; position: relative; overflow: hidden;
  }
  .link-card:hover { transform: translateX(5px); border-color: rgba(255,255,255,0.12); background: #2e2e2e; }
  .link-card:active { transform: scale(0.98); }

  .link-ico {
    width: 38px; height: 38px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; background: var(--surface); border: 1px solid var(--border);
  }

  .link-body { flex: 1; }
  .link-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .link-val { font-size: 14px; color: var(--text); }

  .link-arr {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--muted); transition: all 0.2s; flex-shrink: 0;
  }
  .link-card:hover .link-arr { background: var(--accent); color: #fff; border-color: var(--accent); }

  .sec-row {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 2px; margin-top: 4px;
  }
  .sec-line { flex: 1; height: 1px; background: var(--border); }
  .sec-text { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }

  .footer {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between; margin-top: 8px;
  }
  .footer-left { font-size: 11px; color: var(--muted); }
  .footer-brand { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--text); }
  .brand-dot {
    width: 20px; height: 20px; background: var(--accent); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #1c1c1c;
    font-family: 'Playfair Display', serif;
  }
</style>
</head>
